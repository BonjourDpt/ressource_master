name: CI and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci?schema=public

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger deployment
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL not set, skipping deploy"
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_WEBHOOK_URL"

      - name: Verify deployment health
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_HEALTH_CHECK_URL: ${{ secrets.DEPLOY_HEALTH_CHECK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "Deploy webhook not used; skipping health verification"
            exit 0
          fi
          if [ -z "$DEPLOY_HEALTH_CHECK_URL" ]; then
            echo "DEPLOY_HEALTH_CHECK_URL not set; skipping health verification (set it to your public GET /api/health URL)"
            exit 0
          fi

          echo "Checking health at: $DEPLOY_HEALTH_CHECK_URL"

          max_attempts=30
          delay_sec=10

          for i in $(seq 1 "$max_attempts"); do
            code=$(curl -sS --max-time 5 -o /tmp/health.json -w "%{http_code}" "$DEPLOY_HEALTH_CHECK_URL" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Health check passed (HTTP 200, attempt $i/$max_attempts)"
              exit 0
            fi
            echo "Health check returned HTTP $code (attempt $i/$max_attempts), retrying in ${delay_sec}s..."
            sleep "$delay_sec"
          done

          echo "Health check did not return HTTP 200 after $max_attempts attempts"
          echo "Final response body:"
          cat /tmp/health.json || true
          rm -f /tmp/health.json
          exit 1

  notify-failure:
    needs: [build, deploy]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          FULL_SHA: ${{ github.sha }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping Slack notification"
            exit 0
          fi

          FAILED_JOB=""
          if [ "$BUILD_RESULT" != "success" ]; then
            FAILED_JOB="build"
          elif [ "$DEPLOY_RESULT" != "success" ]; then
            FAILED_JOB="deploy"
          fi

          SHORT_SHA="${FULL_SHA:0:7}"
          payload="$(jq -n \
            --arg workflow "$WORKFLOW_NAME" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg sha "$SHORT_SHA" \
            --arg failed "$FAILED_JOB" \
            --arg url "$RUN_URL" \
            '{
              blocks: [
                { type: "header", text: { type: "plain_text", text: "Workflow failed" } },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Workflow:* `" + $workflow + "`") },
                    { type: "mrkdwn", text: ("*Repository:* `" + $repo + "`") },
                    { type: "mrkdwn", text: ("*Branch:* `" + $branch + "`") },
                    { type: "mrkdwn", text: ("*Commit:* `" + $sha + "`") },
                    { type: "mrkdwn", text: ("*Failed job:* `" + $failed + "`") }
                  ]
                },
                { type: "section", text: { type: "mrkdwn", text: ("<" + $url + "|View GitHub Actions run logs>") } }
              ]
            }')"

          curl -fsS -X POST -H 'Content-Type: application/json' -d "$payload" "$SLACK_WEBHOOK_URL"
